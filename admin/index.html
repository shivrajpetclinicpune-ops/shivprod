<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex">
  <title>Blog Admin | Shivraj Pet Clinic</title>
</head>
<body>
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
  <script>
  (function() {
    var MAX_KB = 200, MAX_PX = 1200;
    function compressImage(file) {
      return new Promise(function(resolve) {
        if (!file.type.startsWith('image/')) return resolve(file);
        if (file.size <= MAX_KB * 1024) return resolve(file);
        var reader = new FileReader();
        reader.onload = function(e) {
          var img = new Image();
          img.onload = function() {
            var w = img.width, h = img.height;
            if (Math.max(w, h) > MAX_PX) {
              var ratio = MAX_PX / Math.max(w, h);
              w = Math.round(w * ratio); h = Math.round(h * ratio);
            }
            var canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            var quality = 0.82;
            var attempt = function() {
              canvas.toBlob(function(blob) {
                if (blob.size > MAX_KB * 1024 && quality > 0.3) { quality -= 0.1; attempt(); }
                else {
                  var compressed = new File([blob], file.name.replace(/\.\w+$/, '.jpg'), { type: 'image/jpeg', lastModified: Date.now() });
                  console.log('Compressed: ' + (file.size/1024).toFixed(0) + 'KB -> ' + (compressed.size/1024).toFixed(0) + 'KB');
                  resolve(compressed);
                }
              }, 'image/jpeg', quality);
            };
            attempt();
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }
    document.addEventListener('change', function(e) {
      if (e.target && e.target.type === 'file') {
        var input = e.target, files = input.files;
        if (!files || !files.length) return;
        var promises = [];
        for (var i = 0; i < files.length; i++) promises.push(compressImage(files[i]));
        Promise.all(promises).then(function(compressed) {
          var dt = new DataTransfer();
          compressed.forEach(function(f) { dt.items.add(f); });
          input.files = dt.files;
        });
      }
    }, true);
  })();
  </script>
</body>
</html>
