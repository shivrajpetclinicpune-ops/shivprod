backend:
  name: github
  repo: shivrajpetclinicpune-ops/shivprod
  branch: main
  base_url: https://cms-auth.shivrajpetclinicpune.workers.dev

media_folder: "images/uploads"
public_folder: "/images/uploads"

publish_mode: simple

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "_posts"
    create: true
    delete: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD-MM-YYYY", time_format: false, picker_utc: true }
      - label: "Category"
        name: "cat"
        widget: "select"
        options:
          - { label: "🐕 Dogs", value: "dog" }
          - { label: "🐈 Cats", value: "cat" }
          - { label: "🐰 Exotic Animals", value: "exotic" }
          - { label: "🔬 Surgery & Lab", value: "surgery" }
          - { label: "💉 Vaccination & Health", value: "health" }
      - { label: "Summary", name: "summary", widget: "text" }
      - { label: "Read Time (minutes)", name: "read", widget: "number", default: 3, value_type: "int" }
      - { label: "Cover Image URL", name: "img", widget: "string", required: false }
      - { label: "Full Article", name: "body", widget: "markdown" }

  - name: "gallery"
    label: "Gallery Photos"
    folder: "images/gallery-data"
    create: true
    delete: true
    slug: "{{slug}}"
    fields:
      - { label: "Caption", name: "title", widget: "string" }
      - { label: "Photo", name: "image", widget: "image" }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "🐕 Dogs", value: "dogs" }
          - { label: "🐈 Cats", value: "cats" }
          - { label: "🐦 Birds", value: "birds" }
          - { label: "🐰 Rabbits", value: "rabbits" }
          - { label: "🐢 Turtles & Reptiles", value: "reptiles" }
          - { label: "🏥 Surgery", value: "surgery" }
          - { label: "👥 Team & Clinic", value: "team" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD-MM-YYYY", time_format: false, picker_utc: true }
